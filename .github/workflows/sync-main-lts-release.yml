name: Sync Main To Servo LTS Release

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  AWS_LC_SYS_NO_ASM: "1"

jobs:
  sync-main-lts:
    name: Sync main to latest Servo LTS release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve latest Servo LTS release
        id: servo
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          req = urllib.request.Request(
              "https://api.github.com/repos/servo/servo/releases",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GITHUB_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req) as response:
              releases = json.load(response)

          stable = [r for r in releases if not r["draft"] and not r["prerelease"]]
          lts = next(
              (
                  release
                  for release in stable
                  if "lts" in (release.get("name") or "").lower()
                  or "lts" in (release.get("tag_name") or "").lower()
              ),
              None,
          )

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              if lts is None:
                  output.write("should_sync=false\n")
              else:
                  output.write("should_sync=true\n")
                  output.write(f"tag={lts['tag_name']}\n")
                  output.write(f"version={lts['tag_name'].lstrip('v')}\n")
          PY

      - name: Stop if no LTS release was found
        if: steps.servo.outputs.should_sync != 'true'
        run: echo "No stable Servo LTS release found."

      - name: Switch to main
        if: steps.servo.outputs.should_sync == 'true'
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Rewrite Servo version pins
        if: steps.servo.outputs.should_sync == 'true'
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          version = "${{ steps.servo.outputs.version }}"
          cargo_replacement = f'servo = "{version}"'

          cargo_files = [
              Path("servo-wgpu-interop-adapter/Cargo.toml"),
              Path("demo-servo-winit/Cargo.toml"),
              Path("demo-servo-iced/Cargo.toml"),
              Path("demo-servo-xilem/Cargo.toml"),
              Path("demo-servo-gpui/Cargo.toml"),
          ]

          for path in cargo_files:
              text = path.read_text(encoding="utf-8")
              updated = re.sub(
                  r'servo = "(?:[^"]+)"',
                  cargo_replacement,
                  text,
              )
              updated = re.sub(
                  r'servo = \{ git = "https://github\.com/servo/servo", rev = "[0-9a-f]{40}" \}',
                  cargo_replacement,
                  updated,
              )
              path.write_text(updated, encoding="utf-8")

          adapter_readme = Path("servo-wgpu-interop-adapter/README.md")
          text = adapter_readme.read_text(encoding="utf-8")
          text = re.sub(r'servo = "(?:[^"]+)"', cargo_replacement, text)
          adapter_readme.write_text(text, encoding="utf-8")
          PY

      - name: Refresh lockfile
        if: steps.servo.outputs.should_sync == 'true'
        run: cargo update

      - name: Validate adapter and reference demo
        if: steps.servo.outputs.should_sync == 'true'
        run: |
          cargo check -p servo-wgpu-interop-adapter --features servo
          cargo check -p demo-servo-winit

      - name: Commit changes
        if: steps.servo.outputs.should_sync == 'true'
        run: |
          if git diff --quiet; then
            echo "main already targets Servo ${{ steps.servo.outputs.tag }}."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock servo-wgpu-interop-adapter/Cargo.toml servo-wgpu-interop-adapter/README.md demo-servo-winit/Cargo.toml demo-servo-iced/Cargo.toml demo-servo-xilem/Cargo.toml demo-servo-gpui/Cargo.toml
          git commit -m "main: sync Servo LTS release to ${{ steps.servo.outputs.tag }}"

      - name: Push main
        if: steps.servo.outputs.should_sync == 'true'
        run: |
          if [ "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)" ]; then
            echo "main is already up to date."
            exit 0
          fi
          git push origin main
