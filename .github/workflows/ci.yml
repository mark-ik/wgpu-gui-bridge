name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # Servo pulls aws-lc-rs which requires nasm on Windows; skip ASM on CI
  AWS_LC_SYS_NO_ASM: "1"

jobs:
  check:
    name: Check and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      # --- Core library ---

      - name: cargo check (no-default-features)
        run: cargo check -p wgpu-native-texture-interop --no-default-features

      - name: cargo check (all features)
        run: cargo check -p wgpu-native-texture-interop --all-features

      - name: cargo test
        run: cargo test -p wgpu-native-texture-interop

      - name: cargo doc
        run: cargo doc -p wgpu-native-texture-interop --no-deps --no-default-features
        env:
          RUSTDOCFLAGS: -D warnings

      # --- Raw GL demo (no Servo dependency, no native build deps) ---

      - name: cargo check demo-raw-gl
        run: cargo check -p demo-raw-gl

      # --- Servo demos ---
      #
      # These require native build deps that mozangle (ANGLE) needs on Linux:
      #   clang, cmake, libssl-dev, pkg-config
      # They run with continue-on-error so a build-env gap doesn't block CI,
      # but failures are still visible in the Actions summary.

      - name: Install Servo build deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang cmake libssl-dev pkg-config \
            libdbus-1-dev libfreetype6-dev libfontconfig1-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: cargo check demo-servo-winit
        run: cargo check -p demo-servo-winit
        continue-on-error: true

      - name: cargo check demo-servo-xilem
        run: cargo check -p demo-servo-xilem
        continue-on-error: true

      - name: cargo check demo-servo-iced
        run: cargo check -p demo-servo-iced
        continue-on-error: true

      - name: cargo check demo-servo-gpui
        run: cargo check -p demo-servo-gpui
        continue-on-error: true
